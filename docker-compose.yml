services:
  chroma:
    image: chromadb/chroma:1.4.4
    container_name: rag-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    restart: unless-stopped
  chroma-admin:
    image: fengzhichao/chromadb-admin:latest
    container_name: rag-chroma-admin
    depends_on:
      - chroma
    ports:
      - "3001:3001"
    restart: unless-stopped
    # In the ChromaDB Admin setup screen, use:
    #   Connection string: http://chroma:8000
    #   Tenant: default_tenant
    #   Database: default_database
    # Do not use http://localhost:8000 here; inside the admin container,
    # localhost points to chroma-admin, not the chroma service.

volumes:
  chroma_data:
